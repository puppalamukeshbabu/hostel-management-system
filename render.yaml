services:
  - type: web
    name: hostel-ms
    runtime: node
    plan: free
    buildCommand: npm run setup
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
